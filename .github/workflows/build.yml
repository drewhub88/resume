name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: true
          latexmk_use_lualatex: true

      - name: Set date version
        id: version
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Rename output
        run: mv resume.pdf resume-${{ steps.version.outputs.DATE }}.pdf

      - name: Commit PDF back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume-${{ steps.version.outputs.DATE }}.pdf
          git diff --staged --quiet || git commit -m "Auto-build resume ${{ steps.version.outputs.DATE }} [skip ci]"
          git push

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume-${{ steps.version.outputs.DATE }}.pdf